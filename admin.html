<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — Bryan's Study Hub</title>
    <link rel="icon" type="image/png" href="web_icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --bg2: #f7f7f5;
            --border: #e3e3e0;
            --text: #1a1a1a;
            --text2: #6b6b6b;
            --dim: #9b9b9b;
            --accent: #2383e2;
            --accent2: #1b6ec2;
            --ok: #2ea043;
            --ok-bg: #dafbe1;
            --no: #cf222e;
            --no-bg: #ffebe9;
            --warn: #d97706;
        }

        * { margin: 0; padding: 0; box-sizing: border-box }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg2);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased
        }

        .c {
            max-width: 860px;
            margin: 0 auto;
            padding: 24px 20px 60px
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border)
        }

        .topbar-left { display: flex; align-items: center; gap: 12px }

        .topbar a {
            font-size: .82rem;
            color: var(--accent);
            font-weight: 500;
            text-decoration: none
        }

        .topbar a:hover { text-decoration: underline }

        .topbar-right { display: flex; align-items: center; gap: 14px }

        .topbar-right span { font-size: .82rem; color: var(--dim) }

        .signout-btn {
            font-size: .82rem;
            color: var(--text2);
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            font-family: inherit
        }

        .page-title {
            font-family: 'Noto Serif', serif;
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -.02em;
            margin-bottom: 4px
        }

        .page-sub { font-size: .9rem; color: var(--text2); margin-bottom: 28px }

        /* Summary cards */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 28px
        }

        .stat-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px
        }

        .stat-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--dim); margin-bottom: 6px }
        .stat-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -.02em }

        /* Search */
        .search-wrap { margin-bottom: 16px }

        .search-wrap input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: .88rem;
            font-family: inherit;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color .15s
        }

        .search-wrap input:focus { border-color: var(--accent) }

        /* Section label */
        .section-label {
            font-size: .72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--dim);
            margin-bottom: 10px
        }

        /* User cards */
        .user-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 12px
        }

        .user-head {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            cursor: pointer;
            transition: background .12s
        }

        .user-head:hover { background: var(--bg2) }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            font-size: .88rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .user-meta { flex: 1; min-width: 0 }

        .user-name {
            font-size: .92rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .user-email { font-size: .75rem; color: var(--dim); margin-top: 1px }

        .user-last-seen { font-size: .72rem; color: var(--dim); flex-shrink: 0 }

        .user-chevron {
            font-size: .75rem;
            color: var(--dim);
            transition: transform .2s;
            flex-shrink: 0
        }

        .user-card.open .user-chevron { transform: rotate(180deg) }

        /* Progress mini bar inside head */
        .user-prog {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
            min-width: 100px
        }

        .user-prog-text { font-size: .72rem; color: var(--dim) }
        .user-prog-text strong { color: var(--text2); font-weight: 600 }

        .mini-track {
            width: 100px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden
        }

        .mini-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            transition: width .4s ease
        }

        /* Expanded detail */
        .user-detail {
            display: none;
            border-top: 1px solid var(--border);
            padding: 16px 18px
        }

        .user-card.open .user-detail { display: block }

        .detail-label {
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--dim);
            margin-bottom: 8px;
            margin-top: 16px
        }

        .detail-label:first-child { margin-top: 0 }

        /* Full progress bar */
        .full-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 6px
        }

        .full-fill {
            height: 100%;
            border-radius: 3px;
            background: var(--accent);
            transition: width .4s ease
        }

        .prog-stats {
            display: flex;
            justify-content: space-between;
            font-size: .75rem;
            color: var(--dim)
        }

        .prog-stats strong { color: var(--text2) }


        /* Loading / empty */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--dim);
            font-size: .88rem
        }

        .access-denied {
            text-align: center;
            padding: 60px 20px
        }

        .access-denied h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 8px }
        .access-denied p { color: var(--text2); font-size: .9rem }
    </style>
</head>

<body style="display:none">
    <div class="c">
        <div class="topbar">
            <div class="topbar-left">
                <a href="index.html">← Home</a>
                <span style="color:var(--border)">|</span>
                <span style="font-size:.82rem;font-weight:600;color:var(--text)">Admin Panel</span>
            </div>
            <div class="topbar-right">
                <span id="admin-email"></span>
                <button class="signout-btn" onclick="signOut()">Sign out</button>
            </div>
        </div>

        <!-- Access denied screen (hidden by default) -->
        <div id="denied" style="display:none" class="access-denied">
            <h2>Access Denied</h2>
            <p>You don't have admin privileges to view this page.</p>
        </div>

        <!-- Admin content -->
        <div id="admin-content" style="display:none">
            <div class="page-title">Admin Panel</div>
            <p class="page-sub">Overview of all users, progress, and quiz sessions.</p>

            <!-- Summary stats (reflects selected user) -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-label">Total Sessions</div>
                    <div class="stat-value" id="stat-sessions">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Avg. Score</div>
                    <div class="stat-value" id="stat-avg">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Questions Covered</div>
                    <div class="stat-value" id="stat-coverage">—</div>
                </div>
            </div>

            <!-- Search -->
            <div class="search-wrap">
                <input id="search" type="text" placeholder="Search users by name or email…" oninput="filterUsers()">
            </div>

            <div class="section-label">Users</div>
            <div id="user-list"><div class="loading">Loading users…</div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        let allUsers = []; // cache for search

        auth.onAuthStateChanged(async user => {
            if (!user) { window.location.href = 'login.html'; return; }
            document.getElementById('admin-email').textContent = user.displayName || user.email;
            document.body.style.display = '';

            // Check admin status
            const adminDoc = await db.collection('admins').doc(user.uid).get();
            if (!adminDoc.exists) {
                document.getElementById('denied').style.display = '';
                return;
            }

            document.getElementById('admin-content').style.display = '';
            loadUsers();
        });

        async function loadUsers() {
            const snap = await db.collection('users').orderBy('lastSeen', 'desc').get();
            const list  = document.getElementById('user-list');

            if (snap.empty) {
                list.innerHTML = '<div class="loading">No users found.</div>';
                return;
            }

            list.innerHTML = '';
            allUsers = [];

            // Load each user's data in parallel
            const userPromises = snap.docs.map(async doc => {
                const u    = { uid: doc.id, ...doc.data() };

                // Fetch progress + sessions in parallel
                const [progDoc, sessSnap] = await Promise.all([
                    db.collection('users').doc(u.uid).collection('progress').doc('critical-thinking').get(),
                    db.collection('users').doc(u.uid).collection('sessions').orderBy('date', 'desc').limit(10).get()
                ]);

                u.progress = progDoc.exists ? progDoc.data() : null;
                u.sessions = sessSnap.docs.map(d => d.data());

                return u;
            });

            const users = await Promise.all(userPromises);
            allUsers = users;

            renderUsers(users);
        }

        function renderUsers(users) {
            const list = document.getElementById('user-list');
            list.innerHTML = '';
            if (!users.length) { list.innerHTML = '<div class="loading">No users match.</div>'; return; }

            users.forEach(u => {
                const name     = u.displayName || u.email || 'Unknown';
                const initial  = name.charAt(0).toUpperCase();
                const answered = u.progress ? (u.progress.answeredIds || []).length : 0;
                const bank     = u.progress ? (u.progress.totalBank || 0) : 0;
                const pct      = bank > 0 ? Math.round((answered / bank) * 100) : 0;
                const lastSeen = u.lastSeen ? u.lastSeen.toDate().toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';

                const card = document.createElement('div');
                card.className   = 'user-card';
                card.dataset.uid = u.uid;
                card.dataset.search = (name + ' ' + (u.email || '')).toLowerCase();

                card.innerHTML = `
                    <div class="user-head" onclick="toggleCard(this)">
                        <div class="user-avatar">${initial}</div>
                        <div class="user-meta">
                            <div class="user-name">${name}</div>
                            <div class="user-email">${u.email || '—'}</div>
                        </div>
                        <div class="user-prog">
                            <div class="user-prog-text"><strong>${answered}</strong> / ${bank || '?'} Qs</div>
                            <div class="mini-track"><div class="mini-fill" style="width:${pct}%"></div></div>
                        </div>
                        <div class="user-last-seen">${lastSeen}</div>
                        <div class="user-chevron">▼</div>
                    </div>
                    <div class="user-detail">
                        <div class="detail-label">Critical Thinking — Question Bank Progress</div>
                        <div class="full-track"><div class="full-fill" style="width:${pct}%"></div></div>
                        <div class="prog-stats">
                            <span><strong>${answered}</strong> of <strong>${bank || '?'}</strong> unique questions answered</span>
                            <span style="font-weight:700;color:var(--accent)">${pct}%</span>
                        </div>

                    </div>`;

                list.appendChild(card);
            });
        }


        function toggleCard(head) {
            const card = head.closest('.user-card');
            const isOpen = card.classList.contains('open');

            // Close all open cards
            document.querySelectorAll('.user-card.open').forEach(c => c.classList.remove('open'));

            if (!isOpen) {
                card.classList.add('open');
                const uid = card.dataset.uid;
                const u = allUsers.find(x => x.uid === uid);
                if (u) updateStatCards(u);
            } else {
                resetStatCards();
            }
        }

        function updateStatCards(u) {
            const sessions = u.sessions || [];
            const pctsWithVal = sessions.filter(s => s.pct != null);
            const avgScore = pctsWithVal.length ? Math.round(pctsWithVal.reduce((a, s) => a + s.pct, 0) / pctsWithVal.length) + '%' : '—';
            const answered = u.progress ? (u.progress.answeredIds || []).length : 0;
            const bank = u.progress ? (u.progress.totalBank || 0) : 0;

            document.getElementById('stat-sessions').textContent = sessions.length;
            document.getElementById('stat-avg').textContent      = avgScore;
            document.getElementById('stat-coverage').textContent = bank ? `${answered}/${bank}` : '—';
        }

        function resetStatCards() {
            document.getElementById('stat-sessions').textContent = '—';
            document.getElementById('stat-avg').textContent      = '—';
            document.getElementById('stat-coverage').textContent = '—';
        }

        function filterUsers() {
            const q = document.getElementById('search').value.toLowerCase();
            const filtered = q ? allUsers.filter(u => (u.displayName + ' ' + u.email).toLowerCase().includes(q)) : allUsers;
            renderUsers(filtered);
        }

        function signOut() { auth.signOut().then(() => window.location.href = 'login.html'); }
    </script>
</body>

</html>
