<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Bryan's Study Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --bg2: #f7f7f5;
            --border: #e3e3e0;
            --text: #1a1a1a;
            --text2: #6b6b6b;
            --dim: #9b9b9b;
            --accent: #2383e2;
            --accent2: #1b6ec2;
            --no: #cf222e;
            --no-bg: #ffebe9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg2);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            padding: 20px
        }

        .card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 36px 32px;
            width: 100%;
            max-width: 380px
        }

        .brand {
            font-size: .78rem;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: .07em;
            margin-bottom: 20px
        }

        h1 {
            font-family: 'Noto Serif', serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -.02em;
            margin-bottom: 6px
        }

        .sub {
            font-size: .88rem;
            color: var(--text2);
            margin-bottom: 28px
        }

        .field {
            margin-bottom: 14px
        }

        label {
            display: block;
            font-size: .8rem;
            font-weight: 500;
            color: var(--text2);
            margin-bottom: 5px
        }

        input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
            font-size: .9rem;
            color: var(--text);
            background: var(--bg);
            outline: none;
            transition: border-color .15s
        }

        input:focus { border-color: var(--accent) }

        .btn {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: #fff;
            font-family: inherit;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background .15s
        }

        .btn:hover { background: var(--accent2) }
        .btn:disabled { opacity: .6; cursor: default }

        .toggle {
            text-align: center;
            margin-top: 18px;
            font-size: .82rem;
            color: var(--text2)
        }

        .toggle a {
            color: var(--accent);
            cursor: pointer;
            font-weight: 500;
            text-decoration: none
        }

        .toggle a:hover { text-decoration: underline }

        .err {
            display: none;
            margin-top: 14px;
            padding: 9px 12px;
            background: var(--no-bg);
            color: var(--no);
            border-radius: 7px;
            font-size: .82rem;
            font-weight: 500
        }

        .err.show { display: block }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0 0;
            color: var(--dim);
            font-size: .78rem
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border)
        }

        .btn-apple {
            width: 100%;
            margin-top: 12px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: #000;
            color: #fff;
            font-family: inherit;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background .15s
        }

        .btn-apple:hover { background: #222 }
        .btn-apple:disabled { opacity: .6; cursor: default }
    </style>
</head>

<body>
    <div class="card">
        <div class="brand">Bryan's Study Hub</div>
        <h1 id="form-title">Welcome back</h1>
        <p class="sub" id="form-sub">Sign in to access your subjects.</p>

        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
        </div>

        <div class="err" id="err-msg"></div>

        <button class="btn" id="submit-btn" onclick="handleSubmit()">Sign in</button>

        <div class="divider">or</div>
        <button class="btn-apple" id="apple-btn" onclick="signInWithApple()">
            <svg width="17" height="17" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.9 0 663.1 0 541.8c0-194.3 125.4-297.5 248.2-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/>
            </svg>
            Sign in with Apple
        </button>

        <div class="toggle">
            <span id="toggle-text">Don't have an account?</span>
            <a onclick="toggleMode()"> <span id="toggle-link">Sign up</span></a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // If already logged in, skip login page
        auth.onAuthStateChanged(user => {
            if (user) window.location.href = 'index.html';
        });

        let isSignUp = false;

        function toggleMode() {
            isSignUp = !isSignUp;
            document.getElementById('form-title').textContent  = isSignUp ? 'Create account'              : 'Welcome back';
            document.getElementById('form-sub').textContent    = isSignUp ? 'Sign up to get started.'     : 'Sign in to access your subjects.';
            document.getElementById('submit-btn').textContent  = isSignUp ? 'Sign up'                     : 'Sign in';
            document.getElementById('toggle-text').textContent = isSignUp ? 'Already have an account?'    : "Don't have an account?";
            document.getElementById('toggle-link').textContent = isSignUp ? 'Sign in'                     : 'Sign up';
            showErr('');
        }

        function showErr(msg) {
            const el = document.getElementById('err-msg');
            el.textContent = msg;
            el.classList.toggle('show', !!msg);
        }

        function handleSubmit() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('submit-btn');

            if (!email || !password) { showErr('Please fill in all fields.'); return; }

            btn.disabled = true;
            btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';
            showErr('');

            const action = isSignUp
                ? auth.createUserWithEmailAndPassword(email, password)
                : auth.signInWithEmailAndPassword(email, password);

            action
                .then(() => window.location.href = 'index.html')
                .catch(e => {
                    showErr(friendlyError(e.code));
                    btn.disabled = false;
                    btn.textContent = isSignUp ? 'Sign up' : 'Sign in';
                });
        }

        function friendlyError(code) {
            const map = {
                'auth/user-not-found':       'No account found with that email.',
                'auth/wrong-password':        'Incorrect password.',
                'auth/invalid-email':         'Please enter a valid email address.',
                'auth/email-already-in-use':  'An account with that email already exists.',
                'auth/weak-password':         'Password must be at least 6 characters.',
                'auth/too-many-requests':     'Too many attempts. Please try again later.',
                'auth/invalid-credential':    'Incorrect email or password.',
            };
            return map[code] || 'Something went wrong. Please try again.';
        }

        function signInWithApple() {
            const btn = document.getElementById('apple-btn');
            btn.disabled = true;
            btn.textContent = 'Signing in…';
            showErr('');
            const provider = new firebase.auth.OAuthProvider('apple.com');
            auth.signInWithPopup(provider)
                .then(() => window.location.href = 'index.html')
                .catch(e => {
                    showErr(friendlyError(e.code));
                    btn.disabled = false;
                    btn.innerHTML = `<svg width="17" height="17" viewBox="0 0 814 1000" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76 0-103.7 40.8-165.9 40.8s-105-37.5-155.5-127.4C46 790.9 0 663.1 0 541.8c0-194.3 125.4-297.5 248.2-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.3z"/></svg> Sign in with Apple`;
                });
        }

        // Allow pressing Enter to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleSubmit();
        });
    </script>
</body>

</html>
