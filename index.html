<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #fff;
            --bg2: #f7f7f5;
            --card: #fff;
            --border: #e3e3e0;
            --text: #1a1a1a;
            --text2: #6b6b6b;
            --dim: #9b9b9b;
            --accent: #2383e2;
            --accent2: #1b6ec2;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased
        }

        .c {
            max-width: 740px;
            margin: 0 auto;
            padding: 24px 20px 60px
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            margin-bottom: 8px;
            border-bottom: 1px solid var(--border)
        }

        .topbar span {
            font-size: .82rem;
            color: var(--text2);
            font-weight: 500
        }

        .hero {
            padding: 32px 0 28px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 32px
        }

        .hero h1 {
            font-family: 'Noto Serif', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -.02em
        }

        .hero p {
            color: var(--text2);
            font-size: .95rem
        }

        .semester-block {
            margin-bottom: 32px
        }

        .semester-label {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--dim);
            margin-bottom: 12px
        }

        .semester-card {
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden
        }

        .semester-header {
            padding: 16px 20px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px
        }

        .semester-header h2 {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: -.01em
        }

        .semester-badge {
            font-size: .7rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--border);
            color: var(--text2);
            letter-spacing: .03em
        }

        .subjects-list {
            display: flex;
            flex-direction: column
        }

        .subject-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--border);
            text-decoration: none;
            color: var(--text);
            transition: background .12s;
            cursor: pointer
        }

        .subject-row:last-child {
            border-bottom: none
        }

        .subject-row:hover {
            background: var(--bg2)
        }

        .subject-row.disabled {
            cursor: default;
            opacity: .55
        }

        .subject-row.disabled:hover {
            background: none
        }

        .subject-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0
        }

        .subject-info {
            flex: 1
        }

        .subject-name {
            font-size: .92rem;
            font-weight: 500
        }

        .subject-code {
            font-size: .78rem;
            color: var(--dim);
            margin-top: 1px
        }

        .subject-arrow {
            font-size: .85rem;
            color: var(--dim)
        }

        .subject-tag {
            font-size: .72rem;
            font-weight: 500;
            padding: 2px 8px;
            border-radius: 4px;
            background: var(--bg2);
            color: var(--text2);
            border: 1px solid var(--border)
        }

        /* Colour accents per subject */
        .dot-blue   { background: #2383e2 }
        .dot-purple { background: #8e44ad }
        .dot-teal   { background: #0d9488 }
        .dot-amber  { background: #d97706 }
        .dot-green  { background: #059669 }
        .dot-pink   { background: #db2777 }

        .prog-wrap {
            margin-top: 6px
        }

        .prog-meta {
            display: flex;
            justify-content: space-between;
            font-size: .72rem;
            color: var(--dim);
            margin-bottom: 4px
        }

        .prog-meta strong {
            color: var(--text2);
            font-weight: 600
        }

        .prog-track {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden
        }

        .prog-fill {
            height: 100%;
            background: #2383e2;
            border-radius: 2px;
            transition: width .4s ease
        }
    </style>
</head>

<body style="display:none">
    <div class="c">
        <div class="topbar">
            <span>Bryan's Study Hub</span>
            <div style="display:flex;align-items:center;gap:14px">
                <span id="user-email" style="font-size:.78rem;color:var(--dim)"></span>
                <button onclick="signOut()" style="font-size:.82rem;color:var(--accent);font-weight:500;background:none;border:none;cursor:pointer;font-family:inherit;padding:0">Sign out</button>
            </div>
        </div>

        <div class="hero">
            <h1>My Subjects</h1>
        </div>

        <!-- Year 2 Semester 2 -->
        <div class="semester-block">
            <div class="semester-label">Year 2</div>
            <div class="semester-card">
                <div class="semester-header">
                    <h2>Semester 2</h2>
                    <span class="semester-badge">Y2S2</span>
                </div>
                <div class="subjects-list">
                    <a href="critical-thinking.html" class="subject-row" style="flex-wrap:wrap">
                        <span class="subject-dot dot-blue"></span>
                        <div class="subject-info">
                            <div class="subject-name">Critical Thinking</div>
                            <div class="subject-code">MPU 3212</div>
                            <div id="ct-progress" class="prog-wrap" style="display:none">
                                <div class="prog-meta">
                                    <span><strong id="ct-answered">0</strong> / <span id="ct-total">0</span> questions answered</span>
                                    <span id="ct-pct">0%</span>
                                </div>
                                <div class="prog-track">
                                    <div class="prog-fill" id="ct-fill" style="width:0%"></div>
                                </div>
                            </div>
                            <div id="ct-progress-empty" style="font-size:.75rem;color:var(--dim);margin-top:4px">No quizzes yet</div>
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0">
                            <span class="subject-tag">Quiz Bank</span>
                            <span class="subject-arrow">→</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <!-- Year 2 Semester 3 -->
        <div class="semester-block">
            <div class="semester-label">Year 2</div>
            <div class="semester-card">
                <div class="semester-header">
                    <h2>Semester 3</h2>
                    <span class="semester-badge">Y2S3</span>
                </div>
                <div class="subjects-list">
                    <div class="subject-row disabled">
                        <span class="subject-dot dot-teal"></span>
                        <div class="subject-info">
                            <div class="subject-name">Requirement Engineering</div>
                            <div class="subject-code">SWE2033</div>
                        </div>
                        <span class="subject-tag">Coming soon</span>
                    </div>
                    <div class="subject-row disabled">
                        <span class="subject-dot dot-amber"></span>
                        <div class="subject-info">
                            <div class="subject-name">Project Management</div>
                            <div class="subject-code">BIS3106</div>
                        </div>
                        <span class="subject-tag">Coming soon</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Session History -->
        <div class="semester-block" id="history-section" style="display:none">
            <div class="semester-label">Recent Sessions</div>
            <div class="semester-card">
                <div class="subjects-list" id="history-list"></div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db   = firebase.firestore();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            } else {
                document.getElementById('user-email').textContent = user.email;
                document.body.style.display = '';
                loadProgress(user.uid);
                loadHistory(user.uid);
            }
        });

        function loadProgress(uid) {
            db.collection('users').doc(uid).collection('progress').doc('critical-thinking').get()
                .then(doc => {
                    if (doc.exists) {
                        const { answeredIds = [], totalBank = 0 } = doc.data();
                        const answered = answeredIds.length;
                        const total = totalBank || 0;
                        const pct = total > 0 ? Math.round((answered / total) * 100) : 0;

                        document.getElementById('ct-answered').textContent = answered;
                        document.getElementById('ct-total').textContent = total;
                        document.getElementById('ct-pct').textContent = pct + '%';
                        document.getElementById('ct-fill').style.width = pct + '%';
                        document.getElementById('ct-progress').style.display = '';
                        document.getElementById('ct-progress-empty').style.display = 'none';
                    }
                });
        }

        function loadHistory(uid) {
            db.collection('users').doc(uid).collection('sessions')
                .orderBy('date', 'desc').limit(5).get()
                .then(snap => {
                    if (snap.empty) return;
                    const list = document.getElementById('history-list');
                    const CH_NAMES = { 1:'Ch1', 2:'Ch2', 3:'Ch3', 4:'Ch4', 5:'Ch5', 6:'Ch6', 7:'Ch7', 8:'Ch8' };
                    snap.forEach(doc => {
                        const s = doc.data();
                        const date = s.date ? s.date.toDate().toLocaleDateString('en-GB', { day:'numeric', month:'short' }) : '—';
                        const chs  = (s.chapters || []).map(c => CH_NAMES[c] || `Ch${c}`).join(', ');
                        const col  = s.pct >= 70 ? '#2ea043' : s.pct >= 50 ? '#d97706' : '#cf222e';
                        list.innerHTML += `
                            <div style="display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--border)">
                                <div style="flex:1">
                                    <div style="font-size:.88rem;font-weight:500">Critical Thinking</div>
                                    <div style="font-size:.75rem;color:var(--dim);margin-top:2px">${chs} · ${s.mode === 'quick' ? 'Quick 40' : 'Full Bank'} · ${date}</div>
                                </div>
                                <div style="font-size:.9rem;font-weight:600;color:${col}">${s.pct}%</div>
                                <div style="font-size:.78rem;color:var(--dim)">${s.score}/${s.total}</div>
                            </div>`;
                    });
                    // Remove border from last row
                    const rows = list.querySelectorAll('div[style*="border-bottom"]');
                    if (rows.length) rows[rows.length - 1].style.borderBottom = 'none';
                    document.getElementById('history-section').style.display = '';
                });
        }

        function signOut() {
            auth.signOut().then(() => window.location.href = 'login.html');
        }
    </script>
</body>

</html>
